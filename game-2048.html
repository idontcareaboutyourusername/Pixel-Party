<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party - 2048</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    #board {
      display: grid;
      grid-template-columns: repeat(4, minmax(56px, 90px));
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(46, 255, 255, 0.5);
    }
    .tile {
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      border-radius: 9px;
      font-size: clamp(0.7rem, 2.4vw, 1rem);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
      transition: transform 100ms ease;
    }
  </style>
</head>
<body class="game-page">
  <a href="pixel-party.html" class="back-button">Return to Home Page</a>

  <main class="game-wrapper">
    <h1 class="game-heading">2048</h1>
    <div class="meta">
      <span class="pill">Score: <strong id="score">0</strong></span>
      <button id="resetBtn" class="game-button">New Game</button>
    </div>
    <section id="board" class="panel" aria-label="2048 board"></section>
    <p class="instructions">Use arrow keys or WASD. Combine matching numbers and reach 2048.</p>
  </main>

  <script>
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const resetBtn = document.getElementById("resetBtn");
    let board = [];
    let score = 0;

    const colors = {
      0: "#1d1b3c",
      2: "#52f6ff",
      4: "#66ff8e",
      8: "#ffe263",
      16: "#ff9e4f",
      32: "#ff62ae",
      64: "#d17dff",
      128: "#7dfffc",
      256: "#57ffa2",
      512: "#fff45a",
      1024: "#ff8b50",
      2048: "#ff45e6"
    };

    function initGame() {
      board = Array.from({ length: 4 }, () => [0, 0, 0, 0]);
      score = 0;
      spawnTile();
      spawnTile();
      render();
    }

    function spawnTile() {
      const empty = [];
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          if (board[r][c] === 0) empty.push([r, c]);
        }
      }
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function compressRow(row) {
      const filtered = row.filter(Boolean);
      const out = [];
      for (let i = 0; i < filtered.length; i++) {
        if (filtered[i] === filtered[i + 1]) {
          const merged = filtered[i] * 2;
          out.push(merged);
          score += merged;
          i++;
        } else {
          out.push(filtered[i]);
        }
      }
      while (out.length < 4) out.push(0);
      return out;
    }

    function move(direction) {
      const before = JSON.stringify(board);

      let moved = false;
      if (direction === "left") {
        board = board.map((row) => compressRow(row));
      }

      if (direction === "right") {
        board = board.map((r) => r.slice().reverse());
        board = board.map((row) => compressRow(row));
        board = board.map((r) => r.slice().reverse());
      }

      if (direction === "up") {
        for (let c = 0; c < 4; c++) {
          const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
          const out = compressRow(col);
          for (let r = 0; r < 4; r++) board[r][c] = out[r];
        }
      }

      if (direction === "down") {
        for (let c = 0; c < 4; c++) {
          const col = [board[3][c], board[2][c], board[1][c], board[0][c]];
          const out = compressRow(col);
          board[3][c] = out[0];
          board[2][c] = out[1];
          board[1][c] = out[2];
          board[0][c] = out[3];
        }
      }

      moved = before !== JSON.stringify(board);
      if (moved) {
        spawnTile();
        render();
        if (isGameOver()) {
          setTimeout(() => alert("Game Over! Start a new game to play again."), 20);
        }
      }
    }

    function isGameOver() {
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          if (board[r][c] === 0) return false;
          if (c < 3 && board[r][c] === board[r][c + 1]) return false;
          if (r < 3 && board[r][c] === board[r + 1][c]) return false;
        }
      }
      return true;
    }

    function render() {
      boardEl.innerHTML = "";
      board.flat().forEach((value) => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = value ? value : "";
        tile.style.background = colors[value] || "#ffffff";
        tile.style.color = value >= 8 ? "#16011f" : "#07131d";
        boardEl.appendChild(tile);
      });
      scoreEl.textContent = score;
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowleft", "a"].includes(key)) move("left");
      if (["arrowright", "d"].includes(key)) move("right");
      if (["arrowup", "w"].includes(key)) move("up");
      if (["arrowdown", "s"].includes(key)) move("down");
    });

    resetBtn.addEventListener("click", initGame);
    initGame();
  </script>
</body>
</html>
