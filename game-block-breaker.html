<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party - Block Breaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="game-page" data-requires-game="block-breaker">
  <div class="top-bar">
    <span class="pill">Total Points: <strong data-points-display>0</strong></span>
    <div class="top-actions">
      <button class="small-button" data-theme-toggle style="display:none;">Use Retro Theme</button>
      <a href="shop.html" class="small-button">Shop</a>
      <a href="pixel-party.html" class="back-button">Return to Home Page</a>
    </div>
  </div>

  <main class="game-wrapper">
    <h1 class="game-heading">Block Breaker</h1>
    <div class="meta">
      <span class="pill">Score: <strong id="score">0</strong></span>
      <button id="resetBtn" class="game-button">Restart</button>
    </div>
    <canvas id="breakerCanvas" class="game-canvas" width="640" height="420" aria-label="Block Breaker game"></canvas>
    <p class="instructions">Use left/right arrows to move. Break bricks for points and clear all for a big bonus.</p>
  </main>

  <script src="app.js"></script>
  <script>
    const canvas = document.getElementById("breakerCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const resetBtn = document.getElementById("resetBtn");
    const brickRows = 5;
    const brickCols = 10;
    const brickW = 56;
    const brickH = 18;
    const brickGap = 6;
    let bricks = [];
    let paddle;
    let ball;
    let score = 0;
    let pointsEarned = 0;
    let running = true;
    const keys = { left: false, right: false };

    function themeVar(name, fallback) {
      return getComputedStyle(document.body).getPropertyValue(name).trim() || fallback;
    }

    function init() {
      bricks = [];
      for (let r = 0; r < brickRows; r++) {
        for (let c = 0; c < brickCols; c++) {
          bricks.push({
            x: 22 + c * (brickW + brickGap),
            y: 38 + r * (brickH + brickGap),
            alive: true
          });
        }
      }
      paddle = { x: canvas.width / 2 - 60, y: canvas.height - 28, w: 120, h: 12, speed: 8 };
      ball = { x: canvas.width / 2, y: canvas.height - 45, r: 8, vx: 4, vy: -4 };
      score = 0;
      pointsEarned = 0;
      running = true;
      scoreEl.textContent = "0";
      draw();
    }

    function update() {
      if (!running) return;
      if (keys.left) paddle.x -= paddle.speed;
      if (keys.right) paddle.x += paddle.speed;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.vx *= -1;
      if (ball.y - ball.r < 0) ball.vy *= -1;

      if (
        ball.y + ball.r >= paddle.y &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w &&
        ball.y < paddle.y + paddle.h
      ) {
        ball.vy = -Math.abs(ball.vy);
        const hitOffset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        ball.vx = 6 * hitOffset;
      }

      bricks.forEach((brick) => {
        if (!brick.alive) return;
        if (
          ball.x + ball.r >= brick.x &&
          ball.x - ball.r <= brick.x + brickW &&
          ball.y + ball.r >= brick.y &&
          ball.y - ball.r <= brick.y + brickH
        ) {
          brick.alive = false;
          ball.vy *= -1;
          score += 20;
          pointsEarned += 5;
          window.pixelParty.addPoints(5);
          scoreEl.textContent = String(score);
        }
      });

      if (bricks.every((brick) => !brick.alive)) {
        running = false;
        window.pixelParty.addPoints(120);
        setTimeout(() => alert("You cleared all bricks! +120 bonus points."), 20);
      }

      if (ball.y - ball.r > canvas.height) {
        running = false;
        setTimeout(() => alert("Ball lost. Press Restart to try again."), 20);
      }
    }

    function draw() {
      ctx.fillStyle = themeVar("--game-bg", "#03040c");
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      bricks.forEach((brick) => {
        if (!brick.alive) return;
        ctx.fillStyle = themeVar("--snake-body", "#2effff");
        ctx.fillRect(brick.x, brick.y, brickW, brickH);
      });

      ctx.fillStyle = themeVar("--snake-head", "#6eff5f");
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = themeVar("--snake-food", "#ff3dbf");
      ctx.fill();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") keys.left = true;
      if (e.key === "ArrowRight") keys.right = true;
    });
    window.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
    });

    window.addEventListener("pixelparty:themechange", draw);
    resetBtn.addEventListener("click", init);
    init();
    loop();
  </script>
</body>
</html>
