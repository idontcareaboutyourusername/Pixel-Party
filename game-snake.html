<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party - Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="game-page">
  <div class="top-bar">
    <span class="pill">Total Points: <strong data-points-display>0</strong></span>
    <div class="top-actions">
      <button class="small-button" data-theme-toggle style="display:none;">Use Retro Theme</button>
      <a href="shop.html" class="small-button">Shop</a>
      <a href="pixel-party.html" class="back-button">Return to Home Page</a>
    </div>
  </div>

  <main class="game-wrapper">
    <h1 class="game-heading">Snake Game</h1>
    <div class="meta">
      <span class="pill">Score: <strong id="score">0</strong></span>
      <button id="resetBtn" class="game-button">Restart</button>
    </div>
    <canvas id="snakeCanvas" class="game-canvas" width="420" height="420" aria-label="Snake game"></canvas>
    <div class="touch-controls">
      <span></span>
      <button data-dir="up">&uarr;</button>
      <span></span>
      <button data-dir="left">&larr;</button>
      <button data-dir="down">&darr;</button>
      <button data-dir="right">&rarr;</button>
    </div>
    <p class="instructions">Move with arrow keys or WASD. Eat glowing food and avoid walls and your tail. Each snack grants points.</p>
  </main>

  <script src="app.js"></script>
  <script>
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const resetBtn = document.getElementById("resetBtn");
    const cell = 21;
    const cells = canvas.width / cell;
    let snake, dir, food, score, timer;

    function themeVar(name, fallback) {
      return getComputedStyle(document.body).getPropertyValue(name).trim() || fallback;
    }

    function randomCell() {
      return Math.floor(Math.random() * cells);
    }

    function reset() {
      snake = [{ x: 10, y: 10 }];
      dir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = "0";
      food = { x: randomCell(), y: randomCell() };
      clearInterval(timer);
      timer = setInterval(loop, 120);
      draw();
    }

    function setDir(nextX, nextY) {
      if (snake.length > 1 && dir.x === -nextX && dir.y === -nextY) return;
      dir = { x: nextX, y: nextY };
    }

    function loop() {
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells) {
        return gameOver();
      }
      if (snake.some((segment) => segment.x === head.x && segment.y === head.y)) {
        return gameOver();
      }
      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        window.pixelParty.addPoints(12);
        do {
          food = { x: randomCell(), y: randomCell() };
        } while (snake.some((segment) => segment.x === food.x && segment.y === food.y));
      } else {
        snake.pop();
      }
      draw();
    }

    function gameOver() {
      clearInterval(timer);
      setTimeout(() => alert("Snake crashed! Press Restart to play again."), 20);
    }

    function draw() {
      ctx.fillStyle = themeVar("--game-bg", "#04020f");
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = themeVar("--game-grid", "rgba(46,255,255,0.08)");
      for (let i = 0; i <= cells; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cell, 0);
        ctx.lineTo(i * cell, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cell);
        ctx.lineTo(canvas.width, i * cell);
        ctx.stroke();
      }

      snake.forEach((segment, idx) => {
        const snakeColor = idx === 0 ? themeVar("--snake-head", "#6eff5f") : themeVar("--snake-body", "#2effff");
        ctx.fillStyle = snakeColor;
        ctx.shadowColor = snakeColor;
        ctx.shadowBlur = 8;
        ctx.fillRect(segment.x * cell + 2, segment.y * cell + 2, cell - 4, cell - 4);
      });

      ctx.shadowBlur = 14;
      ctx.fillStyle = themeVar("--snake-food", "#ff3dbf");
      ctx.shadowColor = themeVar("--snake-food", "#ff3dbf");
      ctx.fillRect(food.x * cell + 3, food.y * cell + 3, cell - 6, cell - 6);
      ctx.shadowBlur = 0;
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (["arrowup", "w"].includes(key)) setDir(0, -1);
      if (["arrowdown", "s"].includes(key)) setDir(0, 1);
      if (["arrowleft", "a"].includes(key)) setDir(-1, 0);
      if (["arrowright", "d"].includes(key)) setDir(1, 0);
    });

    document.querySelectorAll(".touch-controls button").forEach((button) => {
      button.addEventListener("click", () => {
        const d = button.dataset.dir;
        if (d === "up") setDir(0, -1);
        if (d === "down") setDir(0, 1);
        if (d === "left") setDir(-1, 0);
        if (d === "right") setDir(1, 0);
      });
    });

    resetBtn.addEventListener("click", reset);
    window.addEventListener("pixelparty:themechange", draw);
    reset();
  </script>
</body>
</html>
