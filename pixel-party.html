<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home-page">
  <div class="top-bar">
    <span class="pill">Total Points: <strong data-points-display>0</strong></span>
    <div class="top-actions">
      <button class="small-button" data-theme-toggle style="display:none;">Use Retro Theme</button>
      <a href="shop.html" class="small-button">Shop</a>
    </div>
  </div>

  <header class="hero" id="top">
    <h1 class="hero-title">Pixel Party</h1>
    <p class="hero-subtitle">Jump into neon arcade chaos with classic mini-games and earn points to unlock themes.</p>
    <a href="#menu" class="scroll-indicator" aria-label="Scroll down to select game">
      <span>Scroll down to select game</span>
      <span class="arrow">&darr;</span>
    </a>
  </header>

  <main id="menu" class="menu-section">
    <h2 class="menu-title">Pick Your Game</h2>
    <div class="game-grid">
      <a class="game-card" href="game-2048.html">
        <h3>2048</h3>
        <img src="assets/2048-shot.svg" alt="Screenshot preview of 2048">
      </a>
      <a class="game-card" href="game-snake.html">
        <h3>Snake Game</h3>
        <img src="assets/snake-shot.svg" alt="Screenshot preview of Snake Game">
      </a>
      <a class="game-card" href="game-tetris.html">
        <h3>Tetris</h3>
        <img src="assets/tetris-shot.svg" alt="Screenshot preview of Tetris">
      </a>
      <a class="game-card" href="game-minesweeper.html" data-lock-game="minesweeper">
        <h3>Minesweeper</h3>
        <span class="lock-badge" data-lock-badge>Locked - Buy In Shop</span>
        <img src="assets/minesweeper-shot.svg" alt="Screenshot preview of Minesweeper">
      </a>
      <a class="game-card" href="game-block-breaker.html" data-lock-game="block-breaker">
        <h3>Block Breaker</h3>
        <span class="lock-badge" data-lock-badge>Locked - Buy In Shop</span>
        <img src="assets/block-breaker-shot.svg" alt="Screenshot preview of Block Breaker">
      </a>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
